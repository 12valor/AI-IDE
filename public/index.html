<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard</title>
    <!-- Modern Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <h1>Analytics Dashboard</h1>
            <p>Live revenue and item performance metrics</p>
        </header>

        <div class="charts-grid">
            <!-- Monthly Revenue Trend -->
            <div class="chart-card wide-card">
                <div class="card-header">
                    <h2>Total Revenue by Month</h2>
                </div>
                <div class="chart-wrapper">
                    <canvas id="monthlyRevenueChart"></canvas>
                </div>
            </div>

            <!-- Top 10 Items -->
            <div class="chart-card">
                <div class="card-header">
                    <h2>Top 10 Most Bought Items</h2>
                </div>
                <div class="chart-wrapper">
                    <canvas id="topItemsChart"></canvas>
                </div>
            </div>

            <!-- Revenue by Asset Type -->
            <div class="chart-card">
                <div class="card-header">
                    <h2>Revenue by Asset Type</h2>
                </div>
                <div class="chart-wrapper">
                    <canvas id="assetTypeChart"></canvas>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
